name: Deploy
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stop service
        run: sudo systemctl stop Dashboard.service
      - name: Publish
        run: dotnet publish Dashboard/Dashboard.csproj -c Release -o /home/tzer0m/Services/Dashboard
      - name: Start service
        run: sudo systemctl start Dashboard.service
      - name: Check status
        run: sudo systemctl status Dashboard.service --no-pager
